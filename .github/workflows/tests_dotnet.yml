name: .NET Parity Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  dotnet-parity:
    name: Rust/.NET Note Parity (ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Populate tests_dotnet/Rocksmith2014.NET — the committed empty folder
      # acts as a stable anchor; CI checks out the pinned .NET source here.
      - name: Checkout Rocksmith2014.NET v3.5.0
        uses: actions/checkout@v4
        with:
          repository: iminashi/Rocksmith2014.NET
          ref: v3.5.0
          path: tests_dotnet/Rocksmith2014.NET

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Build the CLI shim in release mode so the .NET project can call it.
      - name: Build rocksmith2014-ffi CLI shim
        run: cargo build --release -p rocksmith2014-ffi

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Run the .NET comparison project.  It calls the Rust CLI for each PSARC
      # in tests/DLC, compares with Rocksmith2014.NET output, and exits non-zero
      # on any mismatch.
      - name: Run Rust/.NET note-parity comparison
        run: |
          dotnet run --project tests_dotnet/NoteCompare/NoteCompare.csproj \
            -- tests/DLC "${{ github.workspace }}/target/release/rocksmith2014-ffi"
