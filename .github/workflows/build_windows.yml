name: Build Windows

on:
  release:
    types: [published]

jobs:
  test:
    name: Run tests
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run all tests
        run: cargo test --workspace

  build:
    name: Build release (Windows)
    needs: test
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --workspace --release

      - name: Package artefacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/windows | Out-Null
          Get-ChildItem target/release -Depth 0 -Include *.rlib, *.lib, *.dll |
            Copy-Item -Destination dist/windows
          Compress-Archive -Path dist/windows -DestinationPath rocksmith2014-rs-windows.zip

      - name: Upload release artefact
        uses: actions/upload-artifact@v4
        with:
          name: rocksmith2014-rs-windows
          path: rocksmith2014-rs-windows.zip

      - name: Attach to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: rocksmith2014-rs-windows.zip
